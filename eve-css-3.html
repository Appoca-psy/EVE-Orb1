<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eve</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh;
  background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden;
  font-family:'Segoe UI', system-ui, sans-serif;
}

.scene {
  position:relative;
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* video sits in the middle at 16:9 */
.orb-wrap {
  position:absolute;
  width:100vw;
  height:56.25vw;
  max-height:100vh;
  max-width:177.78vh;
}

video {
  width:100%; height:100%;
  transition: filter 1.4s ease;
}

/* particle ring canvas covers full scene */
#ringCanvas {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
}

.name {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  font-size:0.65rem; letter-spacing:0.55em;
  color:rgba(255,255,255,0.15); text-transform:uppercase; z-index:10;
}
.state-label {
  position:fixed; top:36px; left:50%; transform:translateX(-50%);
  font-size:0.58rem; letter-spacing:0.2em;
  color:rgba(255,255,255,0.2); text-transform:uppercase;
  transition: color 1s; z-index:10;
}
.ui {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:7px; flex-wrap:wrap; justify-content:center;
  padding:0 10px; z-index:10;
}
.btn {
  padding:5px 13px; border-radius:20px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.7); color:rgba(255,255,255,0.35);
  font-size:0.64rem; cursor:pointer; letter-spacing:0.04em;
  transition:all 0.3s; backdrop-filter:blur(8px); font-family:inherit;
}
.btn:hover { border-color:rgba(255,255,255,0.35); color:#fff; }
.btn.active { border-color:rgba(255,255,255,0.55); color:#fff; background:rgba(255,255,255,0.07); }

#tap-msg {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  color:rgba(255,255,255,0.5); font-size:0.85rem; letter-spacing:0.15em;
  z-index:20; background:rgba(0,0,0,0.6); padding:12px 24px;
  border-radius:12px; display:none;
}
</style>
</head>
<body>

<div class="name">E V E</div>
<div class="state-label" id="stateLabel">Warten</div>
<div id="tap-msg">▶ Tippen zum Starten</div>

<div class="scene">
  <div class="orb-wrap">
    <video id="vid" loop muted playsinline>
      <source src="https://res.cloudinary.com/pgx5wj8x/video/upload/eve_orb_qzlgsd.mp4" type="video/mp4">
    </video>
  </div>
  <canvas id="ringCanvas"></canvas>
</div>

<div class="ui">
  <button class="btn active" data-state="idle">💤 Warten</button>
  <button class="btn" data-state="listen">🎙 Zuhören</button>
  <button class="btn" data-state="think">🧠 Nachdenken</button>
  <button class="btn" data-state="speak">🔊 Sprechen</button>
  <button class="btn" data-state="done">✅ Fertig</button>
  <button class="btn" data-state="error">⚠️ Fehler</button>
</div>

<script>
const vid = document.getElementById('vid');
const stateLabel = document.getElementById('stateLabel');
const tapMsg = document.getElementById('tap-msg');
const ringCanvas = document.getElementById('ringCanvas');
const rctx = ringCanvas.getContext('2d');

// ── State definitions ─────────────────────────────────────
// hue-rotate to shift video colors
// rgb = particle ring color
const STATES = {
  idle:   { hue:  -60, sat: 0.15, bright: 1.1,  label: 'Warten',      rgb:[220,220,255], labelColor:'rgba(220,220,255,0.3)' },
  listen: { hue:    0, sat: 1.4,  bright: 1.15, label: 'Zuhört…',     rgb:[255,240,80],  labelColor:'rgba(255,240,80,0.5)'  },
  think:  { hue:   60, sat: 1.2,  bright: 0.9,  label: 'Denkt nach…', rgb:[180,80,255],  labelColor:'rgba(180,80,255,0.5)'  },
  speak:  { hue:    0, sat: 1.0,  bright: 1.2,  label: 'Spricht…',    rgb:[200,200,255], labelColor:'rgba(200,200,255,0.4)' },
  done:   { hue:  240, sat: 1.3,  bright: 1.1,  label: 'Fertig ✓',   rgb:[60,255,120],  labelColor:'rgba(60,255,120,0.5)'  },
  error:  { hue:  140, sat: 1.5,  bright: 1.2,  label: 'Fehler!',     rgb:[255,60,60],   labelColor:'rgba(255,60,60,0.5)'   },
};

let curState = 'idle';
let cur = { hue:-60, sat:0.15, bright:1.1, rgb:[220,220,255] };
let targ = { ...STATES.idle, rgb:[...STATES.idle.rgb] };

function applyFilter() {
  vid.style.filter = `hue-rotate(${cur.hue}deg) saturate(${cur.sat}) brightness(${cur.bright})`;
}

let animFrame;
function animateTo(target) {
  cancelAnimationFrame(animFrame);
  function step() {
    const f = 0.035;
    cur.hue    += (target.hue    - cur.hue)    * f;
    cur.sat    += (target.sat    - cur.sat)    * f;
    cur.bright += (target.bright - cur.bright) * f;
    cur.rgb = cur.rgb.map((v,i) => v + (target.rgb[i]-v)*f);
    applyFilter();
    const done =
      Math.abs(cur.hue - target.hue) < 0.05 &&
      Math.abs(cur.sat - target.sat) < 0.001;
    if (!done) animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

let speakInterval;
function startSpeak() {
  let dir = 1, val = 1.2;
  speakInterval = setInterval(() => {
    val += dir * 0.07;
    if (val > 1.5 || val < 1.05) dir *= -1;
    cur.bright = val; applyFilter();
  }, 100);
}
function stopSpeak() { clearInterval(speakInterval); }

// ── Particle ring canvas ──────────────────────────────────
function resizeCanvas() {
  ringCanvas.width  = window.innerWidth;
  ringCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Particle system for extra rings outside video area
const particles = [];
const NUM_PARTICLES = 280;

function initParticles() {
  particles.length = 0;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  // video fills width, height = width * 9/16
  const vidH = window.innerWidth * 0.5625;
  const orbR  = Math.min(window.innerWidth, vidH) * 0.32; // approx orb radius

  for (let i = 0; i < NUM_PARTICLES; i++) {
    // distribute on 2-3 ring radii
    const ringIdx = Math.floor(Math.random() * 3);
    const ringR   = orbR * (1.55 + ringIdx * 0.35) + Math.random() * orbR * 0.12;
    const angle   = Math.random() * Math.PI * 2;
    particles.push({
      angle,
      r: ringR,
      size: 0.8 + Math.random() * 2.0,
      speed: (0.003 + Math.random() * 0.005) * (Math.random() < 0.5 ? 1 : -1),
      opacity: 0.3 + Math.random() * 0.7,
      twinkleSpeed: 0.5 + Math.random() * 2.5,
      twinkleOffset: Math.random() * Math.PI * 2,
      ringIdx,
    });
  }
}
initParticles();
window.addEventListener('resize', initParticles);

let t = 0;
function drawRings() {
  rctx.clearRect(0, 0, ringCanvas.width, ringCanvas.height);
  t += 0.016;

  const cx = ringCanvas.width / 2;
  const cy = ringCanvas.height / 2;
  const vidH = ringCanvas.width * 0.5625;
  const orbR  = Math.min(ringCanvas.width, Math.min(vidH, ringCanvas.height)) * 0.32;

  const [r,g,b] = cur.rgb;

  // draw faint ring lines
  [1.55, 1.9, 2.25].forEach((mult, i) => {
    const rr = orbR * mult;
    rctx.beginPath();
    rctx.arc(cx, cy, rr, 0, Math.PI*2);
    rctx.strokeStyle = `rgba(${r},${g},${b},${0.06 - i*0.015})`;
    rctx.lineWidth = 0.8;
    rctx.stroke();
  });

  // draw particles
  particles.forEach(p => {
    p.angle += p.speed;
    const twinkle = Math.sin(t * p.twinkleSpeed + p.twinkleOffset) * 0.5 + 0.5;
    const alpha = p.opacity * twinkle * (0.5 + 0.5 * (cur.sat > 0.5 ? 1 : 0.4));

    const px = cx + p.r * Math.cos(p.angle);
    const py = cy + p.r * Math.sin(p.angle);

    // glow
    const grd = rctx.createRadialGradient(px,py,0,px,py,p.size*4);
    grd.addColorStop(0, `rgba(${r},${g},${b},${alpha*0.8})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    rctx.fillStyle = grd;
    rctx.beginPath();
    rctx.arc(px, py, p.size*4, 0, Math.PI*2);
    rctx.fill();

    // bright core dot
    rctx.fillStyle = `rgba(255,255,255,${alpha*0.9})`;
    rctx.beginPath();
    rctx.arc(px, py, p.size*0.6, 0, Math.PI*2);
    rctx.fill();
  });

  requestAnimationFrame(drawRings);
}
drawRings();

// ── Video autoplay ────────────────────────────────────────
vid.load();
vid.play().catch(() => {
  tapMsg.style.display = 'block';
  document.addEventListener('click', () => {
    vid.play(); tapMsg.style.display = 'none';
  }, { once: true });
});

// ── Controls ──────────────────────────────────────────────
document.querySelectorAll('.btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    stopSpeak();
    const s = STATES[b.dataset.state];
    curState = b.dataset.state;
    targ = { ...s, rgb:[...s.rgb] };
    stateLabel.textContent = s.label;
    stateLabel.style.color = s.labelColor;
    animateTo(targ);
    if (b.dataset.state === 'speak') startSpeak();
  });
});

applyFilter();
</script>
</body>
</html>
