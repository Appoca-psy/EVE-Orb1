<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eve</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh;
  background:#000;
  overflow:hidden;
  font-family:'Segoe UI', system-ui, sans-serif;
}

/* background canvas fills entire screen */
#bgCanvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:0;
}

/* video centered on top */
.orb-wrap {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:min(55vw, 55vh * 16/9);
  height:min(55vh, 55vw * 9/16);
  z-index:1;
}

video {
  width:100%; height:100%;
  transition: filter 1.4s ease;
}

.color-overlay {
  position:absolute;
  top:0; left:0; width:100%; height:100%;
  pointer-events:none;
  transition: background 1.4s ease, opacity 1.4s ease;
  mix-blend-mode: color;
  opacity:0;
}

.name {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  font-size:0.65rem; letter-spacing:0.55em;
  color:rgba(255,255,255,0.15); text-transform:uppercase; z-index:10;
}
.state-label {
  position:fixed; top:38px; left:50%; transform:translateX(-50%);
  font-size:0.58rem; letter-spacing:0.2em;
  color:rgba(255,255,255,0.25); text-transform:uppercase;
  transition:color 1s; z-index:10;
}
.ui {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:7px; flex-wrap:wrap; justify-content:center;
  padding:0 10px; z-index:10;
}
.btn {
  padding:5px 13px; border-radius:20px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.7); color:rgba(255,255,255,0.35);
  font-size:0.64rem; cursor:pointer; letter-spacing:0.04em;
  transition:all 0.3s; backdrop-filter:blur(8px); font-family:inherit;
}
.btn:hover { border-color:rgba(255,255,255,0.35); color:#fff; }
.btn.active { border-color:rgba(255,255,255,0.6); color:#fff; background:rgba(255,255,255,0.07); }

#tap-msg {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  color:rgba(255,255,255,0.5); font-size:0.85rem; letter-spacing:0.15em;
  z-index:20; background:rgba(0,0,0,0.6); padding:12px 24px;
  border-radius:12px; display:none;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="orb-wrap">
  <video id="vid" loop muted playsinline>
    <source src="https://res.cloudinary.com/pgx5wj8x/video/upload/gemini_generated_video_b94b6cbd_lu9ueb.mp4" type="video/mp4">
  </video>
  <div class="color-overlay" id="overlay"></div>
</div>

<div class="name">E V E</div>
<div class="state-label" id="stateLabel">Warten</div>
<div id="tap-msg">▶ Tippen zum Starten</div>

<div class="ui">
  <button class="btn active" data-state="idle">💤 Warten</button>
  <button class="btn" data-state="listen">🎙 Zuhören</button>
  <button class="btn" data-state="think">🧠 Nachdenken</button>
  <button class="btn" data-state="speak">🔊 Sprechen</button>
  <button class="btn" data-state="done">✅ Fertig</button>
  <button class="btn" data-state="error">⚠️ Fehler</button>
</div>

<script>
const vid     = document.getElementById('vid');
const overlay = document.getElementById('overlay');
const canvas  = document.getElementById('bgCanvas');
const ctx     = canvas.getContext('2d');
const stateLabel = document.getElementById('stateLabel');
const tapMsg  = document.getElementById('tap-msg');

// ── States ────────────────────────────────────────────────
const STATES = {
  idle:  { hue:0,   sat:1.0, bright:1.0,  ovCol:null,            ovOp:0,    rgb:[180,100,255], label:'Warten',      lCol:'rgba(200,160,255,0.35)' },
  listen:{ hue:180, sat:1.5, bright:1.15, ovCol:'rgb(255,220,0)', ovOp:0.5, rgb:[255,230,50],  label:'Zuhört…',     lCol:'rgba(255,230,50,0.6)'   },
  think: { hue:0,   sat:1.2, bright:0.9,  ovCol:'rgb(160,50,255)',ovOp:0.45,rgb:[180,80,255],  label:'Denkt nach…', lCol:'rgba(180,80,255,0.6)'   },
  speak: { hue:0,   sat:1.1, bright:1.2,  ovCol:null,            ovOp:0,    rgb:[200,120,255], label:'Spricht…',    lCol:'rgba(200,160,255,0.4)'  },
  done:  { hue:180, sat:1.3, bright:1.1,  ovCol:'rgb(30,220,80)', ovOp:0.5, rgb:[50,230,100],  label:'Fertig ✓',   lCol:'rgba(50,230,100,0.6)'   },
  error: { hue:180, sat:1.5, bright:1.15, ovCol:'rgb(255,40,40)', ovOp:0.5, rgb:[255,60,60],   label:'Fehler!',     lCol:'rgba(255,60,60,0.6)'    },
};

let curRgb  = [180,100,255];
let targRgb = [180,100,255];

function applyState(s) {
  vid.style.filter = `hue-rotate(${s.hue}deg) saturate(${s.sat}) brightness(${s.bright})`;
  if (s.ovCol) { overlay.style.background=s.ovCol; overlay.style.opacity=s.ovOp; }
  else { overlay.style.opacity=0; }
  stateLabel.textContent = s.label;
  stateLabel.style.color = s.lCol;
  targRgb = [...s.rgb];
}

let speakIv;
function startSpeak(){
  let dir=1,br=1.2;
  speakIv=setInterval(()=>{br+=dir*0.07;if(br>1.5||br<1.0)dir*=-1;vid.style.filter=`hue-rotate(0deg) saturate(1.1) brightness(${br})`;},100);
}
function stopSpeak(){ clearInterval(speakIv); }

// ── Canvas setup ──────────────────────────────────────────
function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', ()=>{ resize(); buildScene(); });

// ── Scene elements ────────────────────────────────────────
let stars=[], ring1Parts=[], ring2Parts=[], dustParts=[];

function buildScene(){
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2;
  // rings sized relative to screen – big enough to fill it
  const R1 = Math.min(W,H)*0.38;
  const R2 = Math.min(W,H)*0.52;

  // stars
  stars=[];
  for(let i=0;i<280;i++){
    stars.push({
      x:Math.random()*W, y:Math.random()*H,
      size:0.3+Math.random()*1.2,
      op:0.2+Math.random()*0.6,
      tw:0.5+Math.random()*2, twO:Math.random()*Math.PI*2
    });
  }

  // ring 1 particles (inner)
  ring1Parts=[];
  for(let i=0;i<220;i++){
    const a=(i/220)*Math.PI*2+Math.random()*0.08;
    ring1Parts.push({
      angle:a,
      r:R1+(Math.random()-0.5)*R1*0.06,
      size:0.8+Math.random()*1.8,
      speed:(0.0015+Math.random()*0.003)*(Math.random()<0.5?1:-1),
      op:0.4+Math.random()*0.6,
      tw:0.5+Math.random()*2, twO:Math.random()*Math.PI*2
    });
  }

  // ring 2 particles (outer)
  ring2Parts=[];
  for(let i=0;i<180;i++){
    const a=(i/180)*Math.PI*2+Math.random()*0.1;
    ring2Parts.push({
      angle:a,
      r:R2+(Math.random()-0.5)*R2*0.05,
      size:0.6+Math.random()*1.4,
      speed:(0.001+Math.random()*0.002)*(Math.random()<0.5?1:-1),
      op:0.3+Math.random()*0.5,
      tw:0.4+Math.random()*1.5, twO:Math.random()*Math.PI*2
    });
  }

  // dust between rings
  dustParts=[];
  for(let i=0;i<400;i++){
    const a=Math.random()*Math.PI*2;
    const r=R1*0.85 + Math.random()*(R2*1.15-R1*0.85);
    dustParts.push({
      x:cx+r*Math.cos(a), y:cy+r*Math.sin(a),
      size:0.4+Math.random()*1.0,
      op:0.1+Math.random()*0.4,
      tw:0.3+Math.random()*1.5, twO:Math.random()*Math.PI*2,
      drift: (Math.random()-0.5)*0.15,
      driftA: Math.random()*Math.PI*2,
    });
  }
}
buildScene();

// ── Draw loop ─────────────────────────────────────────────
let t=0;
function draw(){
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2;
  ctx.clearRect(0,0,W,H);
  t+=0.016;

  // lerp color
  curRgb=curRgb.map((v,i)=>v+(targRgb[i]-v)*0.025);
  const [r,g,b]=curRgb;

  // ── deep nebula background glow ──────────────────────────
  const neb=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.55);
  neb.addColorStop(0,`rgba(${r},${g},${b},0.12)`);
  neb.addColorStop(0.5,`rgba(${Math.round(r*0.6)},${Math.round(g*0.3)},${Math.round(b*0.8)},0.07)`);
  neb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=neb;
  ctx.fillRect(0,0,W,H);

  // ── stars ────────────────────────────────────────────────
  stars.forEach(s=>{
    const tw=Math.sin(t*s.tw+s.twO)*0.5+0.5;
    ctx.fillStyle=`rgba(255,255,255,${s.op*tw})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.size*0.5,0,Math.PI*2); ctx.fill();
  });

  // ── dust cloud ───────────────────────────────────────────
  dustParts.forEach(d=>{
    d.driftA+=0.003;
    d.x+=Math.cos(d.driftA)*d.drift;
    d.y+=Math.sin(d.driftA)*d.drift;
    const tw=Math.sin(t*d.tw+d.twO)*0.5+0.5;
    const alpha=d.op*tw;
    const grd=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,d.size*3);
    grd.addColorStop(0,`rgba(${r},${g},${b},${alpha})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.size*3,0,Math.PI*2); ctx.fill();
  });

  const R1=Math.min(W,H)*0.38;
  const R2=Math.min(W,H)*0.52;

  // ── ring glow lines ──────────────────────────────────────
  [[R1,0.18],[R2,0.10]].forEach(([rr,op])=>{
    const pulse=Math.sin(t*1.2)*0.03;
    ctx.beginPath();
    ctx.arc(cx,cy,rr*(1+pulse),0,Math.PI*2);
    ctx.strokeStyle=`rgba(${r},${g},${b},${op})`;
    ctx.lineWidth=1.5;
    ctx.stroke();
    // soft outer glow
    ctx.beginPath();
    ctx.arc(cx,cy,rr*(1+pulse),0,Math.PI*2);
    ctx.strokeStyle=`rgba(${r},${g},${b},${op*0.3})`;
    ctx.lineWidth=8;
    ctx.stroke();
  });

  // ── ring 1 particles ─────────────────────────────────────
  ring1Parts.forEach(p=>{
    p.angle+=p.speed;
    const tw=Math.sin(t*p.tw+p.twO)*0.5+0.5;
    const alpha=p.op*tw;
    const px=cx+p.r*Math.cos(p.angle);
    const py=cy+p.r*Math.sin(p.angle);
    const grd=ctx.createRadialGradient(px,py,0,px,py,p.size*4);
    grd.addColorStop(0,`rgba(${r},${g},${b},${alpha*0.9})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(px,py,p.size*4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(px,py,p.size*0.55,0,Math.PI*2); ctx.fill();
  });

  // ── ring 2 particles ─────────────────────────────────────
  ring2Parts.forEach(p=>{
    p.angle+=p.speed;
    const tw=Math.sin(t*p.tw+p.twO)*0.5+0.5;
    const alpha=p.op*tw;
    const px=cx+p.r*Math.cos(p.angle);
    const py=cy+p.r*Math.sin(p.angle);
    const grd=ctx.createRadialGradient(px,py,0,px,py,p.size*4);
    grd.addColorStop(0,`rgba(${r},${g},${b},${alpha*0.8})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(px,py,p.size*4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${alpha*0.9})`;
    ctx.beginPath(); ctx.arc(px,py,p.size*0.5,0,Math.PI*2); ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

// ── Autoplay ──────────────────────────────────────────────
vid.load();
vid.play().catch(()=>{
  tapMsg.style.display='block';
  document.addEventListener('click',()=>{ vid.play(); tapMsg.style.display='none'; },{once:true});
});

// ── Controls ──────────────────────────────────────────────
document.querySelectorAll('.btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    stopSpeak();
    applyState(STATES[b.dataset.state]);
    if(b.dataset.state==='speak') startSpeak();
  });
});

applyState(STATES.idle);
</script>
</body>
</html>
