<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eve</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh;
  background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden;
  font-family:'Segoe UI', system-ui, sans-serif;
}

.orb-wrap {
  position:relative;
  width:min(88vw, 88vh);
  height:min(88vw, 88vh);
  border-radius:50%;
  overflow:hidden;
  flex-shrink:0;
}

video {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%, -50%);
  /* video is 16:9, we crop to square */
  height:100%;
  width:auto;
  min-width:100%;
  transition: filter 1.2s ease;
}

/* circular mask */
.orb-wrap::after {
  content:'';
  position:absolute;
  inset:0;
  border-radius:50%;
  box-shadow: inset 0 0 60px 60px #000;
  pointer-events:none;
}

.name {
  position:fixed; top:22px; left:50%; transform:translateX(-50%);
  font-size:0.68rem; letter-spacing:0.55em;
  color:rgba(200,150,255,0.2); text-transform:uppercase;
}
.state-label {
  position:fixed; top:46px; left:50%; transform:translateX(-50%);
  font-size:0.6rem; letter-spacing:0.2em;
  color:rgba(200,150,255,0.3); text-transform:uppercase;
  transition: color 1s;
}

.ui {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
  padding:0 10px;
}
.btn {
  padding:6px 14px; border-radius:20px;
  border:1px solid rgba(180,80,255,0.2);
  background:rgba(0,0,0,0.65); color:rgba(200,120,255,0.45);
  font-size:0.67rem; cursor:pointer; letter-spacing:0.04em;
  transition:all 0.3s; backdrop-filter:blur(8px); font-family:inherit;
}
.btn:hover { border-color:rgba(180,80,255,0.5); color:#d090ff; }
.btn.active { border-color:rgba(200,100,255,0.7); color:#eeccff; background:rgba(100,20,180,0.15); }

#tap-msg {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  color:rgba(200,150,255,0.5); font-size:0.8rem; letter-spacing:0.15em;
  text-align:center; pointer-events:none;
  display:none;
}
</style>
</head>
<body>

<div class="name">E V E</div>
<div class="state-label" id="stateLabel">Warten</div>
<div id="tap-msg">Tippen zum Starten</div>

<div class="orb-wrap" id="orbWrap">
  <video id="vid" loop muted playsinline>
    <source src="https://res.cloudinary.com/pgx5wj8x/video/upload/eve_orb_qzlgsd.mp4" type="video/mp4">
  </video>
</div>

<div class="ui">
  <button class="btn active" data-state="idle">💤 Warten</button>
  <button class="btn" data-state="listen">🎙 Zuhören</button>
  <button class="btn" data-state="think">🧠 Nachdenken</button>
  <button class="btn" data-state="speak">🔊 Sprechen</button>
  <button class="btn" data-state="done">✅ Fertig</button>
  <button class="btn" data-state="error">⚠️ Fehler</button>
</div>

<script>
const vid = document.getElementById('vid');
const stateLabel = document.getElementById('stateLabel');
const tapMsg = document.getElementById('tap-msg');

// ── States: CSS filter values ─────────────────────────────
// hue-rotate, saturate, brightness
const STATES = {
  idle:   { hue:  0,   sat: 1.0, bright: 1.0,  label: 'Warten',      color: 'rgba(200,150,255,0.3)' },
  listen: { hue:  160, sat: 1.3, bright: 1.1,  label: 'Zuhört…',     color: 'rgba(100,150,255,0.4)' },
  think:  { hue:  40,  sat: 0.8, bright: 0.8,  label: 'Denkt nach…', color: 'rgba(180,120,255,0.3)' },
  speak:  { hue: -40,  sat: 1.5, bright: 1.3,  label: 'Spricht…',    color: 'rgba(255,150,255,0.4)' },
  done:   { hue:  240, sat: 1.2, bright: 1.1,  label: 'Fertig ✓',    color: 'rgba(100,255,150,0.4)' },
  error:  { hue:  140, sat: 1.5, bright: 1.2,  label: 'Fehler!',     color: 'rgba(255,100,100,0.4)' },
};

// current interpolated values
let cur = { hue: 0, sat: 1.0, bright: 1.0 };
let targ = { ...STATES.idle };

function applyFilter() {
  vid.style.filter = `hue-rotate(${cur.hue}deg) saturate(${cur.sat}) brightness(${cur.bright})`;
}

// smooth interpolation
let animFrame;
function animateTo(target) {
  cancelAnimationFrame(animFrame);
  function step() {
    const f = 0.04;
    cur.hue    += (target.hue    - cur.hue)    * f;
    cur.sat    += (target.sat    - cur.sat)    * f;
    cur.bright += (target.bright - cur.bright) * f;
    applyFilter();

    const done =
      Math.abs(cur.hue - target.hue) < 0.1 &&
      Math.abs(cur.sat - target.sat) < 0.001 &&
      Math.abs(cur.bright - target.bright) < 0.001;

    if (!done) animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

// speak pulse animation
let speakInterval;
function startSpeak() {
  let dir = 1;
  speakInterval = setInterval(() => {
    targ.bright += dir * 0.08;
    if (targ.bright > 1.5 || targ.bright < 1.1) dir *= -1;
    animateTo(targ);
  }, 120);
}
function stopSpeak() {
  clearInterval(speakInterval);
}

// ── Video autoplay ────────────────────────────────────────
vid.load();
const playPromise = vid.play();
if (playPromise !== undefined) {
  playPromise.catch(() => {
    tapMsg.style.display = 'block';
    document.addEventListener('click', () => {
      vid.play();
      tapMsg.style.display = 'none';
    }, { once: true });
  });
}

// ── Button controls ───────────────────────────────────────
document.querySelectorAll('.btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');

    stopSpeak();
    const s = STATES[b.dataset.state];
    targ = { ...s };
    stateLabel.textContent = s.label;
    stateLabel.style.color = s.color;
    animateTo(targ);

    if (b.dataset.state === 'speak') startSpeak();
  });
});

// initial filter
applyFilter();
</script>
</body>
</html>
