<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eve</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh;
  background:#000;
  overflow:hidden;
  font-family:'Segoe UI', system-ui, sans-serif;
  display:flex; align-items:center; justify-content:center;
}

video {
  width:100vw;
  height:56.25vw;
  max-height:100vh;
  max-width:177.78vh;
  transition: filter 1.4s ease;
}

.color-overlay {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  pointer-events:none;
  transition: background 1.4s ease, opacity 1.4s ease;
  mix-blend-mode: color;
  opacity:0;
  z-index:1;
}

.name {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  font-size:0.65rem; letter-spacing:0.55em;
  color:rgba(255,255,255,0.15); text-transform:uppercase; z-index:10;
}
.state-label {
  position:fixed; top:38px; left:50%; transform:translateX(-50%);
  font-size:0.58rem; letter-spacing:0.2em;
  color:rgba(255,255,255,0.25); text-transform:uppercase;
  transition:color 1s; z-index:10;
}
.ui {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:7px; flex-wrap:wrap; justify-content:center;
  padding:0 10px; z-index:10;
}
.btn {
  padding:5px 13px; border-radius:20px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.7); color:rgba(255,255,255,0.35);
  font-size:0.64rem; cursor:pointer; letter-spacing:0.04em;
  transition:all 0.3s; backdrop-filter:blur(8px); font-family:inherit;
}
.btn:hover { border-color:rgba(255,255,255,0.35); color:#fff; }
.btn.active { border-color:rgba(255,255,255,0.6); color:#fff; background:rgba(255,255,255,0.07); }

#tap-msg {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  color:rgba(255,255,255,0.5); font-size:0.85rem; letter-spacing:0.15em;
  z-index:20; background:rgba(0,0,0,0.6); padding:12px 24px;
  border-radius:12px; display:none;
}
</style>
</head>
<body>

<video id="vid" loop muted playsinline>
  <source src="https://res.cloudinary.com/pgx5wj8x/video/upload/gemini_generated_video_b94b6cbd_lu9ueb.mp4" type="video/mp4">
</video>
<div class="color-overlay" id="overlay"></div>

<div class="name">E V E</div>
<div class="state-label" id="stateLabel">Warten</div>
<div id="tap-msg">▶ Tippen zum Starten</div>

<div class="ui">
  <button class="btn active" data-state="idle">💤 Warten</button>
  <button class="btn" data-state="listen">🎙 Zuhören</button>
  <button class="btn" data-state="think">🧠 Nachdenken</button>
  <button class="btn" data-state="speak">🔊 Sprechen</button>
  <button class="btn" data-state="done">✅ Fertig</button>
  <button class="btn" data-state="error">⚠️ Fehler</button>
</div>

<script>
const vid     = document.getElementById('vid');
const overlay = document.getElementById('overlay');
const stateLabel = document.getElementById('stateLabel');
const tapMsg  = document.getElementById('tap-msg');

const STATES = {
  idle:  { hue:0,   sat:1.0, bright:1.0,  ovCol:null,             ovOp:0,    label:'Warten',      lCol:'rgba(200,160,255,0.35)' },
  listen:{ hue:180, sat:1.5, bright:1.15, ovCol:'rgb(255,220,0)',  ovOp:0.5,  label:'Zuhört…',     lCol:'rgba(255,230,50,0.6)'   },
  think: { hue:0,   sat:1.2, bright:0.9,  ovCol:'rgb(160,50,255)', ovOp:0.45, label:'Denkt nach…', lCol:'rgba(180,80,255,0.6)'   },
  speak: { hue:0,   sat:1.1, bright:1.2,  ovCol:null,             ovOp:0,    label:'Spricht…',    lCol:'rgba(200,160,255,0.4)'  },
  done:  { hue:180, sat:1.3, bright:1.1,  ovCol:'rgb(30,220,80)',  ovOp:0.5,  label:'Fertig ✓',   lCol:'rgba(50,230,100,0.6)'   },
  error: { hue:180, sat:1.5, bright:1.15, ovCol:'rgb(255,40,40)',  ovOp:0.5,  label:'Fehler!',     lCol:'rgba(255,60,60,0.6)'    },
};

function applyState(s) {
  vid.style.filter = `hue-rotate(${s.hue}deg) saturate(${s.sat}) brightness(${s.bright})`;
  if (s.ovCol) { overlay.style.background=s.ovCol; overlay.style.opacity=s.ovOp; }
  else { overlay.style.opacity=0; }
  stateLabel.textContent = s.label;
  stateLabel.style.color = s.lCol;
}

let speakIv;
function startSpeak(){
  let dir=1, br=1.2;
  speakIv=setInterval(()=>{
    br+=dir*0.07; if(br>1.5||br<1.0) dir*=-1;
    vid.style.filter=`hue-rotate(0deg) saturate(1.1) brightness(${br})`;
  },100);
}
function stopSpeak(){ clearInterval(speakIv); }

vid.load();
vid.play().catch(()=>{
  tapMsg.style.display='block';
  document.addEventListener('click',()=>{ vid.play(); tapMsg.style.display='none'; },{once:true});
});

document.querySelectorAll('.btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    stopSpeak();
    applyState(STATES[b.dataset.state]);
    if(b.dataset.state==='speak') startSpeak();
  });
});

applyState(STATES.idle);
</script>
</body>
</html>
